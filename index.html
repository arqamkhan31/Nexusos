<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexusOS Ultra</title>
<style>
body {
  margin: 0;
  font-family: monospace;
  background: #050505;
  color: #00ff9f;
  overflow: hidden;
}

/* TOP BAR */
.topbar {
  height: 40px;
  background: #0a0a0a;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  border-bottom: 1px solid #00ff9f33;
}

/* DESKTOP */
.desktop {
  height: calc(100vh - 40px);
  display: flex;
  flex-wrap: wrap;
  padding: 20px;
  gap: 15px;
}

/* ICONS */
.icon {
  width: 90px;
  height: 90px;
  background: #111;
  border: 1px solid #00ff9f33;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  cursor: pointer;
  transition: 0.2s;
}
.icon:hover {
  transform: scale(1.05);
  border-color: #00ff9f;
}

/* WINDOW */
.window {
  position: absolute;
  width: 350px;
  height: 300px;
  background: #0b0b0b;
  border: 1px solid #00ff9f55;
  top: 80px;
  left: 80px;
  display: none;
  flex-direction: column;
}
.winbar {
  background: #111;
  padding: 5px;
  cursor: move;
}
.content {
  flex: 1;
  padding: 10px;
  overflow: auto;
}

/* TERMINAL */
input, textarea {
  width: 100%;
  background: black;
  color: #00ff9f;
  border: 1px solid #00ff9f33;
  padding: 5px;
}

button {
  background: black;
  color: #00ff9f;
  border: 1px solid #00ff9f33;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <div>NexusOS Ultra</div>
  <div id="time"></div>
</div>

<div class="desktop">

  <div class="icon" onclick="openWin('terminal')">
    💻<br>Terminal
  </div>

  <div class="icon" onclick="openWin('notes')">
    📝<br>Notes
  </div>

  <div class="icon" onclick="openWin('ai')">
    🤖<br>AI
  </div>

</div>

<!-- TERMINAL -->
<div class="window" id="terminal">
  <div class="winbar">Terminal</div>
  <div class="content">
    <div id="termOut">NexusOS shell ready...</div>
    <input id="cmd" placeholder="type help..." onkeydown="runCmd(event)">
  </div>
</div>

<!-- NOTES -->
<div class="window" id="notes">
  <div class="winbar">Notes</div>
  <div class="content">
    <textarea id="noteBox" oninput="saveNote()"></textarea>
  </div>
</div>

<!-- AI -->
<div class="window" id="ai">
  <div class="winbar">Offline AI</div>
  <div class="content">
    <div id="aiOut">Ask me something...</div>
    <input id="aiInput" onkeydown="aiAsk(event)">
  </div>
</div>

<script>
function openWin(id){
  document.getElementById(id).style.display = "flex";
}

// TIME
setInterval(()=>{
  document.getElementById("time").innerText = new Date().toLocaleTimeString();
},1000);

// TERMINAL
function runCmd(e){
  if(e.key === "Enter"){
    let cmd = e.target.value;
    let out = document.getElementById("termOut");

    if(cmd === "help"){
      out.innerHTML += "<br>Commands: help, clear, time";
    }
    else if(cmd === "clear"){
      out.innerHTML = "";
    }
    else if(cmd === "time"){
      out.innerHTML += "<br>" + new Date();
    }
    else {
      out.innerHTML += "<br>Unknown command: " + cmd;
    }
    e.target.value = "";
  }
}

// NOTES (localStorage)
let noteBox = document.getElementById("noteBox");
noteBox.value = localStorage.getItem("notes") || "";

function saveNote(){
  localStorage.setItem("notes", noteBox.value);
}

// FAKE AI (offline logic)
function aiAsk(e){
  if(e.key === "Enter"){
    let q = e.target.value.toLowerCase();
    let out = document.getElementById("aiOut");

    let res = "I don't understand.";

    if(q.includes("hello")) res = "Hello user 👋";
    if(q.includes("name")) res = "I am Nexus AI (offline mode)";
    if(q.includes("time")) res = new Date().toLocaleTimeString();
    if(q.includes("help")) res = "Try: hello, time, name";

    out.innerHTML = "You: " + q + "<br>AI: " + res;
    e.target.value = "";
  }
}
</script>

</body>
</html>
