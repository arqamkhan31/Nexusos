<!DOCTYPE html>
<html>
<head>
  <title>NexusOS v4 AI</title>
  <style>
    body { margin:0; background:#0a0a0a; color:white; font-family:monospace; }

    .taskbar {
      position:fixed; bottom:0; width:100%;
      background:#111; padding:8px; display:flex; justify-content:space-between;
    }

    .icon { margin:20px; cursor:pointer; }

    .window {
      display:none; position:absolute; top:80px; left:80px;
      background:#1a1a1a; border:1px solid #555; width:330px;
    }

    .titlebar {
      background:#222; padding:5px; cursor:move;
      display:flex; justify-content:space-between;
    }

    .close { color:red; cursor:pointer; }

    input, textarea {
      width:100%; background:black; color:white; border:1px solid #555;
    }

    iframe { width:100%; height:200px; }

    #loginScreen {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:black; display:flex; justify-content:center; align-items:center;
      flex-direction:column;
    }

    #chatbox {
      height:200px;
      overflow-y:auto;
      border:1px solid #555;
      padding:5px;
    }
  </style>
</head>

<body>

<div id="loginScreen">
  <h2>NexusOS Login</h2>
  <input id="user" placeholder="Enter username">
  <button onclick="login()">Enter</button>
</div>

<div class="desktop" style="display:none;" id="desktop">
  <div class="icon" onclick="openApp('terminal')">🖥 Terminal</div>
  <div class="icon" onclick="openApp('notes')">📝 Notes</div>
  <div class="icon" onclick="openApp('browser')">🌐 Browser</div>
  <div class="icon" onclick="openApp('files')">📁 Files</div>
  <div class="icon" onclick="openApp('ai')">🤖 AI</div>
</div>

<!-- AI -->
<div id="ai" class="window">
  <div class="titlebar" onmousedown="drag(event,'ai')">
    Nexus AI <span class="close" onclick="closeApp('ai')">X</span>
  </div>
  <div id="chatbox"></div>
  <input id="userInput" placeholder="Ask something...">
</div>

<!-- other apps (same as v3) -->
<div id="terminal" class="window">
  <div class="titlebar" onmousedown="drag(event,'terminal')">
    Terminal <span class="close" onclick="closeApp('terminal')">X</span>
  </div>
  <input id="cmd">
  <div id="output"></div>
</div>

<div id="notes" class="window">
  <div class="titlebar" onmousedown="drag(event,'notes')">
    Notes <span class="close" onclick="closeApp('notes')">X</span>
  </div>
  <textarea id="noteArea"></textarea>
</div>

<div id="browser" class="window">
  <div class="titlebar" onmousedown="drag(event,'browser')">
    Browser <span class="close" onclick="closeApp('browser')">X</span>
  </div>
  <input id="url"><button onclick="go()">Go</button>
  <iframe id="frame"></iframe>
</div>

<div id="files" class="window">
  <div class="titlebar" onmousedown="drag(event,'files')">
    Files <span class="close" onclick="closeApp('files')">X</span>
  </div>
  <input id="filename"><textarea id="filecontent"></textarea>
  <button onclick="saveFile()">Save</button>
  <div id="filelist"></div>
</div>

<div class="taskbar">
  <div>NexusOS v4 AI</div>
  <div id="clock"></div>
</div>

<script>
// login
function login(){
  if(document.getElementById("user").value){
    loginScreen.style.display="none";
    desktop.style.display="block";
  }
}

// apps
function openApp(app){ document.getElementById(app).style.display="block"; }
function closeApp(app){ document.getElementById(app).style.display="none"; }

// AI logic
let input = document.getElementById("userInput");
input.addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    let msg = this.value.toLowerCase();
    let chat = document.getElementById("chatbox");

    chat.innerHTML += "<p>🧑: "+msg+"</p>";

    let reply = "I don't understand 🤔";

    if(msg.includes("hello")) reply="Hello 👋";
    else if(msg.includes("time")) reply=new Date().toLocaleTimeString();
    else if(msg.includes("your name")) reply="I am Nexus AI 🤖";
    else if(msg.includes("help")) reply="Try: hello, time, your name";

    chat.innerHTML += "<p>🤖: "+reply+"</p>";

    this.value="";
    chat.scrollTop = chat.scrollHeight;
  }
});

// terminal
document.getElementById("cmd").addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    let cmd=this.value.toLowerCase();
    let out=document.getElementById("output");

    if(cmd==="help") out.innerHTML+="<p>Commands: hello, time</p>";
    else if(cmd==="hello") out.innerHTML+="<p>Hello 👋</p>";
    else if(cmd==="time") out.innerHTML+="<p>"+new Date()+"</p>";
    else out.innerHTML+="<p>Unknown ❌</p>";

    this.value="";
  }
});

// clock
setInterval(()=>{
  clock.innerText=new Date().toLocaleTimeString();
},1000);

// notes save
let note=document.getElementById("noteArea");
note.value=localStorage.getItem("notes")||"";
note.oninput=()=>localStorage.setItem("notes",note.value);

// browser
function go(){ frame.src=url.value; }

// file system
function saveFile(){
  localStorage.setItem(filename.value,filecontent.value);
  loadFiles();
}
function loadFiles(){
  filelist.innerHTML="";
  for(let i=0;i<localStorage.length;i++){
    let k=localStorage.key(i);
    filelist.innerHTML+="<p onclick='openFile(\""+k+"\")'>"+k+"</p>";
  }
}
function openFile(n){
  filename.value=n;
  filecontent.value=localStorage.getItem(n);
}
loadFiles();

// drag
function drag(e,id){
  let el=document.getElementById(id);
  let shiftX=e.clientX-el.offsetLeft;
  let shiftY=e.clientY-el.offsetTop;

  function move(e){
    el.style.left=e.pageX-shiftX+'px';
    el.style.top=e.pageY-shiftY+'px';
  }

  document.addEventListener('mousemove',move);
  document.onmouseup=()=>{
    document.removeEventListener('mousemove',move);
  };
}
</script>

</body>
</html>
