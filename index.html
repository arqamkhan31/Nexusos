<!DOCTYPE html>
<html>
<head>
  <title>NexusOS v5</title>

  <style>
    body {
      margin:0;
      font-family:monospace;
      background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color:white;
    }

    .taskbar {
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      justify-content:space-between;
      background:rgba(0,0,0,0.5);
      backdrop-filter:blur(10px);
      padding:8px;
    }

    .icon {
      margin:20px;
      cursor:pointer;
      transition:0.2s;
    }

    .icon:hover { transform:scale(1.2); }

    .window {
      display:none;
      position:absolute;
      top:80px;
      left:80px;
      width:340px;
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(15px);
      border-radius:10px;
      border:1px solid #555;
      overflow:hidden;
    }

    .titlebar {
      background:rgba(255,255,255,0.1);
      padding:6px;
      display:flex;
      justify-content:space-between;
      cursor:move;
    }

    .close { color:red; cursor:pointer; }

    input, textarea {
      width:100%;
      background:black;
      color:white;
      border:none;
      padding:5px;
    }

    iframe { width:100%; height:200px; border:none; }

    #login {
      position:fixed;
      width:100%;
      height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      background:black;
    }

    #chatbox {
      height:200px;
      overflow:auto;
      padding:5px;
    }
  </style>
</head>

<body>

<div id="login">
  <h2>NexusOS</h2>
  <input id="user" placeholder="Enter name">
  <button onclick="start()">Enter</button>
</div>

<div id="desktop" style="display:none;">
  <div class="icon" onclick="openApp('ai')">🤖 AI</div>
  <div class="icon" onclick="openApp('browser')">🌐</div>
  <div class="icon" onclick="openApp('files')">📁</div>
  <div class="icon" onclick="openApp('notes')">📝</div>
</div>

<!-- AI -->
<div id="ai" class="window">
  <div class="titlebar" onmousedown="drag(event,'ai')">
    Nexus AI <span class="close" onclick="closeApp('ai')">X</span>
  </div>
  <div id="chatbox"></div>
  <input id="msg" placeholder="Ask AI...">
</div>

<!-- Browser -->
<div id="browser" class="window">
  <div class="titlebar" onmousedown="drag(event,'browser')">
    Browser <span class="close" onclick="closeApp('browser')">X</span>
  </div>
  <input id="url" placeholder="https://...">
  <button onclick="go()">Go</button>
  <iframe id="frame"></iframe>
</div>

<!-- Files -->
<div id="files" class="window">
  <div class="titlebar" onmousedown="drag(event,'files')">
    Files <span class="close" onclick="closeApp('files')">X</span>
  </div>
  <input id="fname" placeholder="file name">
  <textarea id="fcontent"></textarea>
  <button onclick="save()">Save</button>
  <div id="list"></div>
</div>

<!-- Notes -->
<div id="notes" class="window">
  <div class="titlebar" onmousedown="drag(event,'notes')">
    Notes <span class="close" onclick="closeApp('notes')">X</span>
  </div>
  <textarea id="note"></textarea>
</div>

<div class="taskbar">
  <div>NexusOS v5</div>
  <div id="clock"></div>
</div>

<script>
// start
function start(){
  if(user.value){
    login.style.display="none";
    desktop.style.display="block";
  }
}

// apps
function openApp(a){ document.getElementById(a).style.display="block"; }
function closeApp(a){ document.getElementById(a).style.display="none"; }

// AI (upgrade ready)
msg.addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    let text=this.value;
    chatbox.innerHTML+="<p>🧑: "+text+"</p>";

    let reply="Thinking...";

    // BASIC AI
    if(text.includes("hello")) reply="Hello 👋";
    else if(text.includes("time")) reply=new Date().toLocaleTimeString();
    else reply="I am basic AI. Connect API for real brain.";

    chatbox.innerHTML+="<p>🤖: "+reply+"</p>";
    this.value="";
    chatbox.scrollTop=chatbox.scrollHeight;
  }
});

// clock
setInterval(()=>clock.innerText=new Date().toLocaleTimeString(),1000);

// notes save
note.value=localStorage.getItem("note")||"";
note.oninput=()=>localStorage.setItem("note",note.value);

// browser
function go(){ frame.src=url.value; }

// files
function save(){
  localStorage.setItem(fname.value,fcontent.value);
  load();
}
function load(){
  list.innerHTML="";
  for(let i=0;i<localStorage.length;i++){
    let k=localStorage.key(i);
    list.innerHTML+="<p onclick='openFile(\""+k+"\")'>"+k+"</p>";
  }
}
function openFile(n){
  fname.value=n;
  fcontent.value=localStorage.getItem(n);
}
load();

// drag
function drag(e,id){
  let el=document.getElementById(id);
  let x=e.clientX-el.offsetLeft;
  let y=e.clientY-el.offsetTop;

  function move(e){
    el.style.left=e.pageX-x+"px";
    el.style.top=e.pageY-y+"px";
  }

  document.addEventListener("mousemove",move);
  document.onmouseup=()=>document.removeEventListener("mousemove",move);
}
</script>

</body>
</html>
